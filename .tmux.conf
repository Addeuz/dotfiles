# Set tmux to be index by 1
set -g base-index 1
set -g pane-base-index 1

# Fix color
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm' # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m' # undercurl colors - needs tmux-3.0 

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Theme
set -g @plugin "janoamaral/tokyo-night-tmux"

# Add date and time
set -g @tokyo-night-tmux_show_datetime 0   # use my own custom datetime
set -g @tokyo-night-tmux_show_netspeed 1
set -g @tokyo-night-tmux_terminal_icon 
set -g @tokyo-night-tmux_active_terminal_icon 
set -g @tokyo-night-tmux_window_id_style "none"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# Custom datetime widget - appended after TPM so it isn't overwritten by the plugin
set -ga status-right "#[fg=#a9b1d6,bg=#1A1B26,nobold,noitalics,nounderscore,nodim]#[fg=#2A2F41,bg=#7aa2f7,bold] %Y-%m-%d 🐶 %H:%M "
